<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Registration - Library Management</title>
  <style>
    :root{--accent:#2563eb;--accent-hover:#1d4ed8;--bg:#f8fafc;--card:#ffffff}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin:0; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px}
    .register-container{background:var(--card);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:500px;padding:40px;animation:slideUp 0.4s ease;max-height:90vh;overflow-y:auto}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{font-size:48px;margin-bottom:12px}
    .logo h1{margin:0;font-size:28px;color:#1e293b}
    .logo p{margin:8px 0 0;color:#64748b;font-size:14px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;margin-bottom:8px;font-weight:600;font-size:14px;color:#374151}
    .form-group label .required{color:#ef4444}
    .form-group input{width:100%;padding:12px 16px;border-radius:10px;border:2px solid #e2e8f0;font-size:15px;transition:all 0.2s;background:#f8fafc}
    .form-group input:focus{outline:none;border-color:var(--accent);background:#fff}
    .form-group input::placeholder{color:#94a3b8}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:480px){.form-row{grid-template-columns:1fr}}
    .btn-register{width:100%;background:var(--accent);color:#fff;padding:14px;border-radius:10px;border:0;cursor:pointer;font-weight:600;font-size:16px;transition:all 0.2s;margin-top:8px}
    .btn-register:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,0.3)}
    .btn-register:active{transform:translateY(0)}
    .btn-register:disabled{background:#94a3b8;cursor:not-allowed;transform:none}
    .links{text-align:center;margin-top:24px}
    .links a{color:var(--accent);text-decoration:none;font-weight:600;font-size:14px}
    .links a:hover{text-decoration:underline}
    .links p{margin:12px 0;color:#64748b;font-size:14px}
    .error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:8px;margin-bottom:20px;font-size:14px;display:none}
    .success{background:#d1fae5;color:#065f46;padding:12px;border-radius:8px;margin-bottom:20px;font-size:14px;display:none}
    .password-strength{margin-top:8px;height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden}
    .password-strength-bar{height:100%;width:0;transition:all 0.3s;background:#ef4444}
    .password-hint{font-size:12px;color:#64748b;margin-top:4px}
  </style>
</head>
<body>
  <div class="register-container">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <h1>Create Account</h1>
      <p>Register to access the library</p>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" placeholder="Enter your full name" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="roll">Roll Number <span class="required">*</span></label>
          <input type="text" id="roll" placeholder="e.g., 2024001" required />
        </div>

        <div class="form-group">
          <label for="serialNo">Serial No. <span class="required">*</span></label>
          <input type="text" id="serialNo" placeholder="e.g., SN-001" required />
        </div>
      </div>

      <div class="form-group">
        <label for="jisuId">JISU ID <span class="required">*</span></label>
        <input type="text" id="jisuId" placeholder="Enter your JISU ID" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" placeholder="your.email@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" placeholder="Create a strong password" required minlength="6" />
        <div class="password-strength">
          <div class="password-strength-bar" id="strengthBar"></div>
        </div>
        <div class="password-hint">Minimum 6 characters</div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
        <input type="password" id="confirmPassword" placeholder="Re-enter your password" required />
      </div>

      <button type="submit" class="btn-register" id="submitBtn">Create Account</button>
    </form>

    <div class="links">
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script>
    const registerForm = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');

    // Password strength indicator
    passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      let strength = 0;
      
      if(password.length >= 6) strength += 25;
      if(password.length >= 10) strength += 25;
      if(/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
      if(/[0-9]/.test(password)) strength += 25;

      strengthBar.style.width = strength + '%';
      
      if(strength < 50) strengthBar.style.background = '#ef4444';
      else if(strength < 75) strengthBar.style.background = '#f59e0b';
      else strengthBar.style.background = '#10b981';
    });

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const roll = document.getElementById('roll').value.trim();
      const serialNo = document.getElementById('serialNo').value.trim();
      const jisuId = document.getElementById('jisuId').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if(!name || !roll || !serialNo || !jisuId || !email || !password){
        showError('Please fill in all required fields');
        return;
      }

      if(password.length < 6){
        showError('Password must be at least 6 characters long');
        return;
      }

      if(password !== confirmPassword){
        showError('Passwords do not match');
        return;
      }

      // Check if email already exists
      const users = JSON.parse(localStorage.getItem('lms_registered_users') || '[]');
      
      if(users.some(u => u.email === email)){
        showError('Email already registered. Please login or use a different email.');
        return;
      }

      if(users.some(u => u.roll === roll)){
        showError('Roll number already registered.');
        return;
      }

      if(users.some(u => u.jisuId === jisuId)){
        showError('JISU ID already registered.');
        return;
      }

      // Create new user
      const newUser = {
        id: 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9),
        name,
        roll,
        serialNo,
        jisuId,
        email,
        password,
        memberSince: new Date().toISOString().split('T')[0],
        borrowed: [],
        history: []
      };

      users.push(newUser);
      localStorage.setItem('lms_registered_users', JSON.stringify(users));

      showSuccess('Account created successfully! Redirecting to login...');
      submitBtn.disabled = true;

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    });

    function showError(message){
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
      setTimeout(() => {
        errorMsg.style.display = 'none';
      }, 5000);
    }

    function showSuccess(message){
      successMsg.textContent = message;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }
  </script>
</body>
</html>
