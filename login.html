<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Login - Library Management</title>
  <style>
    :root{--accent:#2563eb;--accent-hover:#1d4ed8;--bg:#f8fafc;--card:#ffffff}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin:0; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px}
    .login-container{background:var(--card);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:420px;padding:40px;animation:slideUp 0.4s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{font-size:48px;margin-bottom:12px}
    .logo h1{margin:0;font-size:28px;color:#1e293b}
    .logo p{margin:8px 0 0;color:#64748b;font-size:14px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;margin-bottom:8px;font-weight:600;font-size:14px;color:#374151}
    .form-group input{width:100%;padding:12px 16px;border-radius:10px;border:2px solid #e2e8f0;font-size:15px;transition:all 0.2s;background:#f8fafc}
    .form-group input:focus{outline:none;border-color:var(--accent);background:#fff}
    .form-group input::placeholder{color:#94a3b8}
    .btn-login{width:100%;background:var(--accent);color:#fff;padding:14px;border-radius:10px;border:0;cursor:pointer;font-weight:600;font-size:16px;transition:all 0.2s;margin-top:8px}
    .btn-login:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,0.3)}
    .btn-login:active{transform:translateY(0)}
    .divider{text-align:center;margin:24px 0;color:#94a3b8;font-size:14px;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#e2e8f0}
    .divider::before{left:0}
    .divider::after{right:0}
    .links{text-align:center;margin-top:24px}
    .links a{color:var(--accent);text-decoration:none;font-weight:600;font-size:14px}
    .links a:hover{text-decoration:underline}
    .links p{margin:12px 0;color:#64748b;font-size:14px}
    .error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:8px;margin-bottom:20px;font-size:14px;display:none}
    .remember-forgot{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:14px}
    .remember-forgot label{display:flex;align-items:center;gap:6px;color:#64748b;cursor:pointer}
    .remember-forgot a{color:var(--accent);text-decoration:none}
    .remember-forgot a:hover{text-decoration:underline}
    @media (max-width:480px){
      .login-container{padding:30px 24px}
      .logo h1{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <h1>User Login</h1>
      <p>Access your library account</p>
    </div>

    <div id="errorMsg" class="error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your.email@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" id="remember" />
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="divider">OR</div>

    <div class="links">
      <p>Don't have an account? <a href="register.html">Register here</a></p>
      <p><a href="admin-login.html">Admin Login →</a></p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberCheckbox = document.getElementById('remember');

    // Load remembered email if exists
    const rememberedEmail = localStorage.getItem('lms_remembered_email');
    if(rememberedEmail){
      emailInput.value = rememberedEmail;
      rememberCheckbox.checked = true;
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Get registered users
      const users = JSON.parse(localStorage.getItem('lms_registered_users') || '[]');
      
      // Find user
      const user = users.find(u => u.email === email && u.password === password);

      if(user){
        // Remember email if checked
        if(rememberCheckbox.checked){
          localStorage.setItem('lms_remembered_email', email);
        } else {
          localStorage.removeItem('lms_remembered_email');
        }

        // Set current user
        localStorage.setItem('lms_current_user', JSON.stringify({
          id: user.id,
          name: user.name,
          email: user.email,
          roll: user.roll,
          serialNo: user.serialNo,
          jisuId: user.jisuId,
          phone: user.phone || '',
          memberSince: user.memberSince,
          borrowed: user.borrowed || [],
          history: user.history || []
        }));

        // Set login status
        localStorage.setItem('lms_user_logged_in', 'true');

        // Redirect to user portal
        window.location.href = 'user.html';
      } else {
        showError('Invalid email or password. Please try again.');
      }
    });

    function showError(message){
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
      setTimeout(() => {
        errorMsg.style.display = 'none';
      }, 5000);
    }

    // Check if already logged in
    if(localStorage.getItem('lms_user_logged_in') === 'true'){
      window.location.href = 'user.html';
    }
  </script>
</body>
</html>
